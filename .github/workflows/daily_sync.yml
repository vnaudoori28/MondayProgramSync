name: Program Tracker Sync

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, no writes to Monday)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      reset_item_id:
        description: "Optional: Program item ID to reset state for before syncing"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reset state for specific program (optional)
        if: ${{ github.event.inputs.reset_item_id != '' }}
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          TRACKER_BOARD_ID: ${{ secrets.TRACKER_BOARD_ID }}
          SPRINT_BOARD_ID: ${{ secrets.SPRINT_BOARD_ID }}
          SPRINT_GROUP_ID: ${{ secrets.SPRINT_GROUP_ID }}
        run: python src/main.py --reset ${{ github.event.inputs.reset_item_id }}

      - name: Run sync
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          TRACKER_BOARD_ID: ${{ secrets.TRACKER_BOARD_ID }}
          SPRINT_BOARD_ID: ${{ secrets.SPRINT_BOARD_ID }}
          SPRINT_GROUP_ID: ${{ secrets.SPRINT_GROUP_ID }}
          DEFAULT_TASK_OWNER: ${{ secrets.DEFAULT_TASK_OWNER }}
          PROGRAMS_DIR: programs
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python src/main.py --dry-run
          else
            python src/main.py
          fi

      - name: Commit updated state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/pushed_state.json
          git diff --staged --quiet || (git commit -m "chore: update pushed state [skip ci]" && git pull --rebase && git push)
